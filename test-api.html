<!DOCTYPE html>
<html>
<head>
    <title>Test API</title>
</head>
<body>
    <h1>Testing get-showtimes.php API</h1>
    <div id="result"></div>

    <script>
        fetch('get-showtimes.php?movie_id=21')
            .then(r => {
                document.getElementById('result').innerHTML += 'Status: ' + r.status + '<br>';
                return r.text();
            })
            .then(text => {
                document.getElementById('result').innerHTML += 'Response: ' + text + '<br>';
            })
            .catch(err => {
                document.getElementById('result').innerHTML += 'Error: ' + err.message + '<br>';
            });
    </script>
</body>
</html>
